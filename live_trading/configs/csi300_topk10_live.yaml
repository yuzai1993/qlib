# 实盘信号桥接配置：CSI300 TopkDropout topk=10 / n_drop=2
# 当前基线模型：train_start_2006 Alpha158。
# 本文件是实盘完整配置；不得通过其他交易系统配置隐式继承关键参数。

data:
  qlib_dir: "~/.qlib/qlib_data/cn_data"
  region: "cn"
  instruments: "csi300"
  benchmark: "SH000300"

model:
  experiment_name: "train_20260711_223223_train_start_2006_run01"
  experiment_id: "265134483362085141"
  recorder_id: "40a17c74aa7b4d97a4caa35015aaead5"
  model_class: "qlib.contrib.model.gbdt.LGBModel"
  mlruns_dir: "mlruns"

handler:
  class: "Alpha158"
  module: "qlib.contrib.data.handler"
  start_time: "2003-01-02"
  fit_start_time: "2006-01-02"
  fit_end_time: "2020-01-10"
  infer_processors:
    - class: "ProcessInf"

stock_names:
  source: "tushare"

strategy:
  class: "TopkDropoutStrategy"
  topk: 10
  n_drop: 2
  risk_degree: 0.95
  hold_thresh: 1
  only_tradable: false
  forbid_all_trade_at_limit: false

exchange:
  freq: "day"
  deal_price: "close"
  limit_threshold: 0.095
  open_cost: 0.00021
  close_cost: 0.00071
  min_cost: 5.0
  trade_unit: 100

parity:
  backtest_config: "backtest/configs/csi300_live_parity.yaml"

live:
  # 共享目录：Mac 侧挂载点；Windows 侧对应 D:\qmt_bridge
  bridge_root: "/Volumes/qmt_bridge"
  strategy_id: "csi300_topk10"
  # 资金账号不进 git：留空则要求通过环境变量 QMT_ACCOUNT_ID 提供
  account_id: ""
  account_type: "STOCK"
  default_mode: "LIVE"
  buy_slippage: 0.01
  sell_slippage: 0.01
  max_orders_per_day: 20

storage:
  db_path: "live_trading/data/csi300_topk10_live.db"
  log_dir: "live_trading/logs"

schedule:
  publish_after: "21:00"
  import_after: "15:30"

# 交易费用与红利税（现行规则 2026；佣金请按开户实际费率修改）
fees:
  commission_rate: 0.00020     # 佣金 万2，双向，按 QMT 2026-07-16 实际费用校准
  min_commission: 5.0          # 单笔最低佣金（元）
  stamp_duty_rate: 0.0005      # 印花税 0.05%，仅卖出
  transfer_fee_rate: 0.00001   # 过户费 0.001%，双向
  dividend_tax_rate: 0.20      # 红利税预提（短持有期策略按 20% 估，卖出时券商实扣）

# 监控平台（docs/superpowers/specs/2026-07-13-live-monitor-platform-design.md）
monitor:
  benchmark: "SH000300"
  # 仅用于首个正式交易日收益计算，不会生成或展示 2026-07-16 前的快照。
  performance_baseline:
    first_snapshot_date: "2026-07-16"
    opening_total_value: 10000000.0
    benchmark_close: 4786.78271484375
  notify:
    channel: "serverchan"        # serverchan | pushplus | none；密钥走环境变量
    daily_report: true           # report 阶段无告警也推日报
  thresholds:
    daily_loss: -0.03
    max_drawdown: -0.10
    consecutive_loss_days: 5
    reject_rate: 0.5

web:
  host: "0.0.0.0"
  port: 8081
