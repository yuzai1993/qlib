# 实盘信号桥接配置：CSI300 TopkDropout topk=10 / n_drop=2
# 模型/策略/交易参数继承 paper_trading 配置（单一事实源），本文件只加执行层参数。
# 当前基线模型：train_start_2006 Alpha158（见 base 内 model / handler）

base_config: "paper_trading/configs/csi300_topk10.yaml"

live:
  # 共享目录：Mac 侧挂载点；Windows 侧对应 D:\qmt_bridge
  bridge_root: "/Volumes/qmt_bridge"
  strategy_id: "csi300_topk10"
  # 资金账号不进 git：留空则要求通过环境变量 QMT_ACCOUNT_ID 提供
  account_id: ""
  account_type: "STOCK"
  default_mode: "LIVE"
  buy_slippage: 0.01
  sell_slippage: 0.01
  max_orders_per_day: 20

storage:
  db_path: "live_trading/data/csi300_topk10_live.db"
  log_dir: "live_trading/logs"

schedule:
  publish_after: "21:00"
  import_after: "15:30"

# 交易费用与红利税（现行规则 2026；佣金请按开户实际费率修改）
fees:
  commission_rate: 0.00020     # 佣金 万2，双向，按 QMT 2026-07-16 实际费用校准
  min_commission: 5.0          # 单笔最低佣金（元）
  stamp_duty_rate: 0.0005      # 印花税 0.05%，仅卖出
  transfer_fee_rate: 0.00001   # 过户费 0.001%，双向
  dividend_tax_rate: 0.20      # 红利税预提（短持有期策略按 20% 估，卖出时券商实扣）

# 监控平台（docs/superpowers/specs/2026-07-13-live-monitor-platform-design.md）
monitor:
  benchmark: "SH000300"
  # 仅用于首个正式交易日收益计算，不会生成或展示 2026-07-16 前的快照。
  performance_baseline:
    first_snapshot_date: "2026-07-16"
    opening_total_value: 10000000.0
    benchmark_close: 4786.78271484375
  notify:
    channel: "serverchan"        # serverchan | pushplus | none；密钥走环境变量
    daily_report: true           # report 阶段无告警也推日报
  thresholds:
    daily_loss: -0.03
    max_drawdown: -0.10
    consecutive_loss_days: 5
    reject_rate: 0.5

web:
  host: "0.0.0.0"
  port: 8081
