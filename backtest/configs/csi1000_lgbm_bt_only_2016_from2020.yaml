# CSI1000 已有模型免重训，test 2020-01-13~2026-07-10
# python backtest/scripts/run_backtest.py --config csi1000_lgbm_bt_only_2016_from2020.yaml

run:
  mode: backtest_only
  note: "bt_only_csi1000_from2020_top10_drop2"
  n_runs: 1
  from_session: "20260711_231024_train_start_2016_csi1000"
  from_run: 1
  generate_figures: true

data:
  provider_uri: "~/.qlib/qlib_data/cn_data"
  region: "cn"
  instruments: "csi1000"
  benchmark: "SH000852"
  handler:
    class: "Alpha158"
    module_path: "qlib.contrib.data.handler"
    start_time: "2003-01-02"
    end_time: "2026-07-10"
    fit_start_time: "2016-01-02"
    fit_end_time: "2020-01-10"
    infer_processors:
      - class: ProcessInf

segments:
  train: ["2016-01-02", "2020-01-10"]
  valid: ["2020-01-13", "2023-09-15"]
  test: ["2020-01-13", "2026-07-10"]

model:
  class: "LGBModel"
  module_path: "qlib.contrib.model.gbdt"
  kwargs:
    loss: "mse"
    colsample_bytree: 0.8879
    learning_rate: 0.2
    subsample: 0.8789
    lambda_l1: 205.6999
    lambda_l2: 580.9768
    max_depth: 8
    num_leaves: 210
    num_threads: 20

strategy:
  class: "TopkDropoutStrategy"
  module_path: "qlib.contrib.strategy.signal_strategy"
  topk: 10
  n_drop: 2

backtest:
  account: 1000000
  exchange_kwargs:
    freq: "day"
    limit_threshold: 0.095
    deal_price: "close"
    open_cost: 0.0000954
    close_cost: 0.0005954
    min_cost: 5
