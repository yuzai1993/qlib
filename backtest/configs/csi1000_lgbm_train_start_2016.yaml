# 以 train_start_2016 为基线，股票池 CSI1000，基准 SH000852
# python backtest/scripts/run_backtest.py --config csi1000_lgbm_train_start_2016.yaml

run:
  mode: train_backtest
  note: "train_start_2016_csi1000"
  n_runs: 1
  from_session: null
  from_run: 1
  generate_figures: false

data:
  provider_uri: "~/.qlib/qlib_data/cn_data"
  region: "cn"
  instruments: "csi1000"
  benchmark: "SH000852"
  handler:
    class: "Alpha158"
    module_path: "qlib.contrib.data.handler"
    start_time: "2003-01-02"
    end_time: "2026-07-10"
    fit_start_time: "2016-01-02"
    fit_end_time: "2020-01-10"
    infer_processors:
      - class: ProcessInf

segments:
  train: ["2016-01-02", "2020-01-10"]
  valid: ["2020-01-13", "2023-09-15"]
  test: ["2023-09-18", "2026-07-10"]

model:
  class: "LGBModel"
  module_path: "qlib.contrib.model.gbdt"
  kwargs:
    loss: "mse"
    colsample_bytree: 0.8879
    learning_rate: 0.2
    subsample: 0.8789
    lambda_l1: 205.6999
    lambda_l2: 580.9768
    max_depth: 8
    num_leaves: 210
    num_threads: 20

strategy:
  class: "TopkDropoutStrategy"
  module_path: "qlib.contrib.strategy.signal_strategy"
  topk: 10
  n_drop: 2

backtest:
  account: 1000000
  exchange_kwargs:
    freq: "day"
    limit_threshold: 0.095
    deal_price: "close"
    open_cost: 0.0000954
    close_cost: 0.0005954
    min_cost: 5
