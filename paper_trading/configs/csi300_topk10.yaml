# 模拟盘实例: CSI300 TopkDropout 100万
# 文件名（不含.yaml）即为模拟盘ID
# LGBModel，TopkDropoutStrategy，topk=10，n_drop=2

# ========== 基本设置 ==========
paper_trading:
  name: "CSI300_TopkDropout_100w"
  start_date: "2026-03-11"
  initial_cash: 1000000

# ========== 数据设置 ==========
data:
  qlib_dir: "~/.qlib/qlib_data/cn_data"
  region: "cn"
  instruments: "csi300"
  benchmark: "SH000300"

# ========== 模型设置 ==========
# 切换日 2026-07-11：157维 Alpha158NoVWAP + ProcessInf 重训
# 旧模型: examples/mlruns/418161825478917845/e984aba430c341b9bbf3052a82734d00
model:
  experiment_name: "train_model_run02"
  experiment_id: "329272370075998619"
  recorder_id: "78ac8cd0e27e4f93b366f04f2096f9a4"
  model_class: "qlib.contrib.model.gbdt.LGBModel"
  mlruns_dir: "mlruns"

# ========== 特征设置 ==========
handler:
  class: "Alpha158NoVWAP"
  module: "qlib.contrib.data.handler"
  start_time: "2003-01-02"
  fit_end_time: "2020-01-10"

# ========== 股票名称映射 ==========
stock_names:
  source: "tushare"
  update_interval_days: 1

# ========== 策略设置 ==========
strategy:
  class: "TopkDropoutStrategy"
  topk: 10
  n_drop: 2

# ========== 交易设置 ==========
exchange:
  freq: "day"
  deal_price: "close"
  limit_threshold: 0.095
  open_cost: 0.0005
  close_cost: 0.0015
  min_cost: 5
  trade_unit: 100

# ========== 存储设置 ==========
storage:
  db_path: "paper_trading/data/csi300_topk10.db"
  log_dir: "paper_trading/logs"
  report_dir: "paper_trading/reports"

# ========== 告警设置 ==========
alert:
  enabled: true
  email: "xqyu1993@126.com"
  daily_loss_threshold: -0.03
  max_drawdown_threshold: -0.10
  consecutive_loss_days: 5

# ========== Web 设置 ==========
web:
  enabled: true
  host: "0.0.0.0"
  port: 8080
  auto_refresh: 60
